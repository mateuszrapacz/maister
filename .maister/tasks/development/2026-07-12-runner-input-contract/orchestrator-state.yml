task:
  title: "Harden phase-continue input contract"
  description: >
    Implement .maister/plans/2026-07-12-runner-input-contract.md: replace the
    runner's multi-flag decision input with one validated JSON payload, harden
    the canonical YAML state boundary, migrate all source call-sites, rebuild
    generated platform variants, and verify the existing safety guarantees.
  status: completed
  tags:
    - development
    - runner
    - input-contract
    - validation
  priority: high

