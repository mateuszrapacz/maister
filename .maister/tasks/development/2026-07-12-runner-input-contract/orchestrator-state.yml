    codebase_analysis:
      summary: "The runner still uses legacy multi-flag input and indentation-sensitive YAML mutation. Five source orchestrators and all generated variants inherit the contract; executable coverage lacks strict payload and state-boundary cases."
      decisions:
        - decision: "Use source-only runner and orchestrator edits, then rebuild platform variants"
          rationale: "Generated variants are outputs of the project build pipeline."
      risks:
        - "Report or second-write failure can leave a terminal record with stale phase state."
        - "Generated runners have no behavioral contract test coverage."
      artifacts: []
    clarifications: []
    gap_analysis:
      summary: "The migration is high-risk but bounded to the runner, five source call-sites, normative docs, tests, and generated rebuilds. JSON transport, strict payload validation, canonical state validation, and retry-safe mutation are the remaining gaps; all recommended decisions were approved."
      decisions:
        - decision: "Use stdin plus --input-file PATH and remove legacy flags"
          rationale: "User approved the recommended JSON-only hard cutover."
        - decision: "Accept only the dependency-free canonical state shape"
          rationale: "User approved fail-closed state validation without a new runtime dependency."
        - decision: "Make report/transition retries resume safely"
          rationale: "User approved retry-safe recovery rather than manual recovery or cross-file transactions."
        - decision: "Keep actor advisor|arbiter and confidence high|medium"
          rationale: "User approved preserving the current automatic executor boundary."
        - decision: "Validate non-empty NUL-free paths and reject state/report collisions"
          rationale: "User approved the recommended path safety policy."
        - decision: "Validate phase membership and supported transitions before writes"
          rationale: "User approved strict phase transition validation."
        - decision: "Run shared contract tests against source and all built runners"
          rationale: "User approved generated-variant behavioral verification."
        - decision: "Update the normative reference, five source skills, and tests"
          rationale: "User approved source-only documentation migration followed by regeneration."
      risks:
        - "Report/second-write failures can leave a terminal record without phase advancement."
        - "Generated platform copies need behavioral verification after rebuild."
      artifacts:
        - path: analysis/gap-analysis.md
          label: Gap Analysis
          html: null
    scope_clarifications:
      summary: null
