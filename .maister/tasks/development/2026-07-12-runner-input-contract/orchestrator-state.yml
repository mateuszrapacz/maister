      risks: []
      artifacts: []
    specification:
      summary: "The specification defines a JSON-only stdin/--input-file contract, strict payload and canonical YAML validation, retry-safe persistence, five source call-site migrations, shared source/generated tests, and build validation."
      decisions:
        - decision: "Use strict JSON transport followed by payload/state validation, durable history, reports, and retry-safe transition"
          rationale: "This preserves the runner as an executor while closing ambiguity and state-boundary gaps."
      risks:
        - "Cross-file atomicity is unavailable; retries must be deterministic."
        - "The strict YAML subset must cover all orchestrator state shapes."
        - "Generated runner parity requires a shared matrix."
      artifacts:
        - path: implementation/spec.md
          label: Specification
          html: implementation/spec.html
