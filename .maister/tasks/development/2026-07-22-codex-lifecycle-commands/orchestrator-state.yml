task:
  title: Add Codex Maister lifecycle skills
  description: Add Codex support for maister:bye, maister:resume, maister:status, and the related dev/next session shortcuts in parity with Cursor.
  workflow_type: development
  status: completed
  task_path: .maister/tasks/development/2026-07-22-codex-lifecycle-commands
  project_doc_paths:
    - .maister/docs/INDEX.md
    - .maister/docs/project/architecture.md
    - .maister/docs/project/tech-stack.md
    - .maister/docs/standards/global/build-pipeline.md
    - .maister/docs/standards/global/coding-style.md
    - .maister/docs/standards/global/conventions.md
    - .maister/docs/standards/global/error-handling.md
    - .maister/docs/standards/global/validation.md
    - .maister/docs/standards/testing/test-writing.md
  task_context:
    risk_level: medium
    clarifications_resolved: true
    scope_expanded: false
    architecture_decision: Codex-only native utility skills in the Codex overlay, matching the historical Cursor/Codex implementation without changing the canonical portable skill inventory.
    task_characteristics:
      has_reproducible_defect: false
      modifies_existing_code: true
      creates_new_entities: true
      involves_data_operations: false
      ui_heavy: false
  phase_summaries:
    codebase_analysis:
      summary: The historical implementation generated five Codex utility skills. The current distribution model materializes Codex from overlay contracts, but the Codex overlay has no utility-skill asset tree, while Cursor retains hash-locked equivalents.
      decisions:
        - Add bye, dev, next, resume, and status as Codex-native overlay skills with host-relative names.
        - Keep the canonical portable skill inventory unchanged because these lifecycle entrypoints are host-specific adapters.
      risks:
        - Overlay behavior must remain free of Cursor/Claude vocabulary and must be covered by materialization tests.
      artifacts:
        - path: analysis/codebase-analysis.md
          label: Codebase analysis
          html: null
    clarifications:
      - User wording explicitly names bye, resume, and status and says etc.; historical parity defines etc. as dev and next.
    gap_analysis:
      summary: The requested lifecycle entrypoints are absent from the current Codex overlay even though equivalent Cursor projections and the historical Codex target exist. The safest current integration point is a Codex-only merged utility-skill tree.
      decisions:
        - Keep the common portable skill inventory unchanged.
        - Add five host-relative Codex utility skills: bye, dev, next, resume, and status.
        - Preserve deterministic overlay materialization and verify the produced package.
        - Use the Codex overlay-only integration boundary selected by the user.
      risks:
        - A stale parity baseline may treat the new Codex paths as forbidden additions.
        - The utility skills must not collide with common skills or leak Cursor/Claude vocabulary.
        - bye is an instruction for preserving state, not a native process shutdown primitive.
        - resume/status/next must resolve active task state consistently.
      artifacts: []
    requirements:
      summary: The user confirmed direct Codex skill invocation, reuse of existing orchestrator state and historical lifecycle behavior, and no UI work. The specification must cover five Codex overlay skills and target-aware evidence.
      decisions:
        - Expose bye, dev, next, resume, and status through Codex host-relative skill names.
        - Keep state handling in orchestrator-state.yml and preserve read-only behavior for next/status.
      risks:
        - Codex skill instructions must remain compatible with current workflow continuation semantics.
      artifacts:
        - path: analysis/requirements.md
          label: Requirements
          html: null
    specification:
      summary: The implementation-ready specification defines five Codex overlay assets, a merged skills tree, parity reconciliation, focused materialization coverage, command documentation, acceptance criteria, and verification commands.
      decisions:
        - Use host-relative skill frontmatter so Codex exposes the commands under the maister namespace.
        - Adapt the historical behavior without restoring the removed Codex builders.
      risks:
        - Specification audit should verify that the parity and test contracts cover all five paths.
      artifacts:
        - path: implementation/spec.md
          label: Implementation specification
          html: implementation/spec.html
    spec_audit:
      summary: The specification is implementation-ready with no critical or major gaps. The ten historical Codex lifecycle paths must be removed precisely from the expected-deletion parity rule during implementation.
      decisions:
        - Proceed to implementation planning.
      risks:
        - Parity baseline reconciliation must preserve unrelated expected-deletion observations.
      artifacts:
        - path: verification/spec-audit.md
          label: Specification audit
          html: null
    implementation_plan:
      summary: The plan divides the work into five dependency-ordered groups: assets, overlay wiring, focused materialization test, exact parity reconciliation, and documentation/full verification.
      decisions:
        - Keep implementation writes confined to Codex overlay assets, the Codex overlay contract, focused test, parity baseline, and command documentation.
      risks:
        - Existing user-owned Pi modifications must remain untouched.
      artifacts:
        - path: implementation/implementation-plan.md
          label: Implementation plan
          html: implementation/implementation-plan.html
    implementation:
      summary: The five approved implementation groups are complete. Codex materializes the five lifecycle skills through native overlay precedence, focused deterministic coverage passes, parity evidence passes, and command documentation is updated.
      decisions:
        - Preserve unrelated Cursor projection and Pi evidence drift as pre-existing failures; do not modify those files in this task.
        - Treat the Codex native overlay precedence rule as the minimal architecture change needed because common source already contains same-path host-specific lifecycle files.
      risks:
        - Core/release suites remain partially blocked by pre-existing Cursor/source projection drift and an unrelated Codex deployment rollback failure.
      artifacts:
        - path: implementation/work-log.md
          label: Implementation work log
          html: null
    verification:
      summary: Task-specific Codex verification passes after the explicit native-precedence fix and collision-matrix coverage. Repository-wide verification remains passed with issues because unrelated Cursor/source projection drift, stale Pi command digests, and a native deployment rollback failure remain.
      decisions:
        - Keep the approved Codex-only implementation unchanged.
        - Reconcile native precedence explicitly in the overlay contract and test its collision matrix.
        - Do not expand scope to repair unrelated Cursor projection, Pi agent-binding, or deployment recovery failures.
      risks:
        - The repository-wide core and release gates remain non-green until unrelated baseline and environment issues are resolved.
      artifacts:
        - path: verification/implementation-verification.md
          label: Implementation verification
          html: verification/implementation-verification.html
        - path: verification/completeness-report.md
          label: Completeness report
          html: null
        - path: verification/code-review-report.md
          label: Code review report
          html: null
        - path: verification/pragmatic-review.md
          label: Pragmatic review report
          html: null
        - path: verification/reality-check.md
          label: Reality check report
          html: null
        - path: verification/production-readiness-report.md
          label: Production readiness report
          html: null
        - path: verification/test-suite-results.md
          label: Test suite results
          html: null
