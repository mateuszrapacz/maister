research_context:
  research_type: mixed
  research_question: W jaki sposób uprościć Maister i uniezależnić go od platform AI coding hostów, tak aby utrzymywać jedno testowalne rozwiązanie, a ewentualne różnice wybierać dopiero podczas instalacji — również dla Claude Code, gdzie nie mamy dostępnego runtime do testów?
  scope:
    included:
      - Kanoniczne źródła pluginu, adaptery platformowe i generowane warianty
      - Różnice kontraktów Claude Code, Codex, Cursor i Kiro
      - Instalacja, manifesty, discovery skills/agents/commands i host-native runtime
      - Obecny build, test matrix, walidacja oraz luki testowe Claude Code
      - Możliwe architektury jednego artefaktu lub instalacyjnej materializacji targetu
      - Ścieżka migracji ograniczająca duplikację i ryzyko regresji
    excluded:
      - Implementacja wybranego rozwiązania w tym workflow
      - Zmiana funkcjonalnego zakresu workflow Maister niezwiązana z przenośnością
      - Deklarowanie pełnej zgodności bez dowodów kontraktowych lub runtime
      - Utrzymywanie Claude Code jako wspieranego targetu w docelowej architekturze; może zostać dodany później jako nowy harness
    constraints:
      - Zachować natywne wymagania każdego hosta i jego mechanizm instalacji
      - Zachować audytowalność, resumability i bezpieczeństwo bramek
      - Nie opierać gwarancji Claude Code na runtime, którego projekt nie może uruchomić
      - Preferować jeden kanoniczny model zachowania i deterministyczne granice platformowe
  methodology:
    - Mixed technical, requirements, and literature research
    - Layer decomposition across behavior, portable runtime, host contract, packaging, installation, and assurance
    - Multi-source triangulation with evidence levels E0-E6
    - Comparative scorecard across current build-time generation, install-time materialization, shared core with thin adapters, and optional neutral IR
  sources:
    - planning/sources.md
    - Canonical plugin sources and shared runtime helpers
    - Platform adapters, installers, generated target shapes, and host-owned official documentation
    - Make, CI, contract/install/smoke/E2E tests, and host capability matrix
