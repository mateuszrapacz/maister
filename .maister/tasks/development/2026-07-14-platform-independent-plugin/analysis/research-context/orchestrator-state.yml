        - area: Claude Code assurance bez runtime
          alternatives_count: 3
          chosen_approach: 5D — usunąć Claude Code ze wspieranych targetów i dodać ponownie dopiero przy realnej potrzebie
      deferred_ideas:
        - Pełny neutralny workflow IR, jeśli minimalne primitives przestaną wystarczać.
        - Ponowne dodanie Claude Code jako nowego harnessu po pojawieniu się realnej potrzeby, runtime i testów E5/E6.
        - Integracje marketplace pozostają poza zakresem; instalacja odbywa się z lokalnego lub GitHub repo.
    phase-5:
      summary: "Zaprojektowano modularny monolit dystrybuowany jako repozytoryjny bundle: portable documentation core, jawne Host Overlay Contracts dla Codex/Cursor/Kiro CLI oraz transakcyjny custom installer. Decision log zawiera siedem zaakceptowanych ADR-ów."
      decisions:
        - decision: "Architektura: portable documentation core with explicit host overlays, nie pełny workflow DSL ani install-time compiler promptów."
          rationale: Minimalizuje semantyczną translację i utrzymuje generic skills jako jedno źródło.
        - decision: Harness sam wybiera zwykłe narzędzia wykonawcze; jawne bindings obejmują wyłącznie control flow, safety, persistence i capability-sensitive behavior.
          rationale: Unika mapowania implementacyjnych nazw narzędzi.
        - decision: Jedna kopia generic skills/runtime jest instalowana bez transformacji, a host-native assets są utrzymywane wprost w hosts/codex, hosts/cursor i hosts/kiro-cli.
          rationale: Różnice harnessów pozostają jawne i reviewowalne.
        - decision: Własny installer obsługuje lokalne repo i GitHub source, staging, validation, lock, receipt, atomic commit, update, uninstall i rollback.
          rationale: Instalacja pozostaje kontrolowana i transakcyjna.
        - decision: Nieznana wersja hosta blokuje niepotwierdzone capabilities semantyczne; packaging-only może otrzymać jawny status provisional.
          rationale: Fail-closed chroni semantykę bez sztucznego blokowania packagingu.
        - decision: Legacy build adapters, committed generated trees i Claude Code zostają usunięte w tym samym zadaniu po shadow comparison i spełnieniu Definition of Done.
          rationale: Tymczasowy oracle nie staje się drugą architekturą produkcyjną.
      risks:
        - Docelowe ścieżki discovery i format settings każdego hosta trzeba potwierdzić aktualnymi testami contract/runtime przed implementacją overlayu.
        - Atomowa podmiana całego managed tree jest prosta; wieloplikowy merge do współdzielonych ustawień użytkownika wymaga journalu i byte-exact rollbacku.
        - Neutralna proza może z czasem zacząć przemycać słownik jednego hosta; potrzebny jest forbidden-vocabulary contract oraz review wyjątków.
        - Błędna klasyfikacja capability jako packaging zamiast semantic może przepuścić niezgodność; klasyfikacja musi być jawna i przeglądana.
        - Usunięcie legacy w jednym zadaniu zwiększa wagę końcowej bramki parity, szczególnie dla hooks, agents i invocation semantics.
