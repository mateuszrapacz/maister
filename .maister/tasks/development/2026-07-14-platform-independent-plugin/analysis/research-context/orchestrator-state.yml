    phase-3:
      summary: Wygenerowano pięć obszarów decyzyjnych i piętnaście znacząco różnych alternatyw. Spójna rekomendacja to minimalne typed primitives, hybrydowa materializacja, shadow-first migration, capability-sensitive compatibility oraz jawny Claude evidence ceiling.
      decisions:
        - decision: Recommend minimal, evolutionary typed primitives plus host-aware templates instead of a full neutral IR at migration start.
          rationale: Ogranicza ryzyko over-design i pozwala migrować stopniowo.
        - decision: Recommend a hybrid distribution model in which local installation and CI-prebuilt marketplace artifacts invoke the same deterministic materializer and bundle.
          rationale: Łączy jeden compiler path z wymaganiami marketplace.
        - decision: Recommend removing committed generated trees only after two consecutive stable releases satisfy E1, E2, E4, installed-path E3 canary, reproducible artifact, rollback, and zero unresolved semantic-parity exceptions for every target.
          rationale: Zapewnia mierzalne, odwracalne exit criteria.
        - decision: "Recommend capability-sensitive unknown-version handling: fail closed for semantic or safety-sensitive mappings, and allow packaging-only provisional compatibility after validation with explicit warning and expiring evidence."
          rationale: Unika zarówno nadmiernego blokowania, jak i ryzykownego best-effort.
        - decision: Recommend Claude Code releases use E1–E4 plus shared-core E3 as the enforceable gate, while E5/E6 remain explicitly unavailable until a versioned native probe runs.
          rationale: Utrzymuje uczciwy evidence ceiling bez blokowania całego projektu.
        - decision: Recommend the coherent architecture combination 1A + 2C + 3B + 4C + 5B.
          rationale: Wybrane rekomendacje wzajemnie się wspierają.
      risks:
        - The boundary between a typed primitive and a host-aware template can drift and become another implicit transformation layer without an exception-review policy.
        - Marketplace packaging or signing constraints may require prebuilt artifacts, so local materialization cannot be the only supported distribution channel.
        - Textual parity does not prove semantic parity; the migration oracle must validate inventory, references, descriptors, semantic goldens, and installed-path canaries.
        - Two-release shadow operation temporarily increases CI and maintenance cost and needs a precise definition of a stable release.
        - Capability classification can be wrong; misclassifying a semantic mapping as packaging-only could permit unsafe provisional compatibility.
        - Claude Code E5/E6 remain unverified without a real binary, authentication, version, and executed scenario; unavailable evidence must never be shown as passing.
        - External host documentation and marketplaces can change faster than adapter evidence, so compatibility records need version, scenario, timestamp, and freshness policy.
      artifacts:
        - path: outputs/solution-exploration.md
          label: Solution exploration
          html: outputs/solution-exploration.html
    phase-4:
      summary: "Konwergencja zakończona zestawem 1A + 2D + 3D + 4C + 5D: neutralne minimalne primitives, custom installer, jawne host overlays, task-scoped shadow removal, capability-sensitive compatibility i usunięcie Claude Code."
      decisions:
        - decision: 1A — minimalne typed primitives + host-aware templates
          rationale: Low-level tool selection normally remains with the host harness; explicit bindings cover control-flow, safety, persistence, and capability-sensitive operations.
        - decision: Marketplace jest poza zakresem docelowego modelu instalacji.
          rationale: Instalacja ma działać z lokalnego lub GitHub repo przez własny installer pod pełną kontrolą projektu.
        - decision: 2D — custom installer + wspólne skille + jawne host overlays w repo
          rationale: Generic skills są kopiowane bez transformacji, a hooks, agents, commands, manifests i settings pozostają jawnie zdefiniowane per harness.
        - decision: Okres shadow nie powinien wykraczać poza zadanie implementacyjne.
          rationale: Legacy trees służą do porównania podczas implementacji, ale muszą zniknąć przed Definition of Done.
        - decision: 3D — shadow podczas implementacji, usunięcie legacy trees przed zamknięciem zadania
          rationale: User confirmed task-scoped shadow comparison with mandatory removal before implementation completion.
        - decision: "4C — capability-sensitive: semantic fail-closed, packaging provisional"
          rationale: Semantic and safety-sensitive incompatibilities block installation; packaging-only differences may proceed provisionally after validation.
        - decision: Claude Code nie powinien pozostać wspieranym targetem bez możliwości testowania i realnej potrzeby.
          rationale: Target można później dodać przez ten sam kontrakt host overlay, gdy pojawi się runtime i uzasadniony use case.
        - decision: 5D — usunąć Claude Code ze wspieranych targetów
          rationale: Future Claude support is a separate new-harness task driven by real need and available runtime.
      risks:
        - Zbyt szerokie mapowanie nazw narzędzi stworzy kosztowną warstwę translacji; zbyt wąskie mapowanie może oddać harnessowi operacje wpływające na kontrolę przepływu i bezpieczeństwo.
        - Jawne host overlays mogą dryfować, jeśli wspólne skille zaczną zawierać ukryte zależności od nazw narzędzi konkretnego harnessu.
        - Usunięcie legacy oracle w tym samym zadaniu wymaga mocniejszej bramki parity, ponieważ nie będzie dwóch release obserwacji.
      artifacts: []
      decision_areas:
        - area: Głębokość reprezentacji kanonicznej / IR
          alternatives_count: 3
          chosen_approach: 1A — minimalne typed primitives + host-aware templates
        - area: Dystrybucja i miejsce materializacji
          alternatives_count: 3
