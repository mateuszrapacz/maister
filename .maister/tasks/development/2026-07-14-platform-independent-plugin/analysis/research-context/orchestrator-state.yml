  phase_summaries:
    phase-1:
      summary: Jeden neutralny behavior/runtime core i jeden bundle są wykonalne; host-native drzewa pozostają różne i powinny być materializowane przez typowane, wersjonowane adaptery podczas instalacji. Kierunek ma wysoką pewność, natomiast dokładny descriptor/IR i integracja marketplace wymagają dalszej konwergencji.
      steps_completed: [initialize, plan, gather, synthesize]
      decisions:
        - decision: "Typ badania: mixed — technical, requirements i literature research."
          rationale: Wymagane jest połączenie analizy kodu, kontraktów hostów i źródeł oficjalnych.
        - decision: Jednostką porównania będzie kontrakt zachowania, packagingu, instalacji i weryfikacji, a nie tylko układ plików wygenerowanych pluginów.
          rationale: Sam filesystem shape nie dowodzi parity semantycznej.
        - decision: Gathering Strategy ma trzy stabilne, niezależne kategorie, aby zmieścić analizę w dostępnym limicie agentów i umożliwić późniejsze łączenie ustaleń po identyfikatorach.
          rationale: Kategorie pokrywają core/transforms, host contracts/installation oraz assurance/runtime gap.
        - decision: Hipoteza „różnice dopiero przy instalacji” będzie oceniana obok co najmniej dwóch alternatyw, a nie traktowana jako z góry wybrana architektura.
          rationale: Rekomendacja musi wynikać z porównywalnych dowodów.
        - decision: "Docelowo: portable behavior/runtime core + typed host contracts + install-time materializer."
          rationale: Maksymalizuje jednokrotne testowanie wspólnej semantyki i ogranicza adaptery do wymaganych kontraktów hostów.
        - decision: „Jedno rozwiązanie” oznacza jedno źródło, jeden testowalny core i jeden dystrybuowany bundle; nie oznacza jednego host runtime.
          rationale: Hosty wymagają różnych manifestów, discovery, agents, hooks i MCP placement.
        - decision: Neutralny IR rozwijać ewolucyjnie dla gates/roles/hooks/capabilities, zamiast budować pełny DSL przed migracją.
          rationale: Ogranicza koszt i ryzyko over-design.
        - decision: Instalacja musi używać staging, validation, receipt, atomic swap i byte-exact rollback.
          rationale: Materializacja na maszynie użytkownika musi być transakcyjna.
        - decision: Commitowane target trees usunąć dopiero po potwierdzonej parity i stabilnych release artifacts.
          rationale: Pozwala migrować shadow-first i zachować rollback.
        - decision: Continue to brainstorming evaluation
          rationale: User explicitly chose to continue after reviewing the completed research foundation and report.
      risks:
        - Dokumentacja hostów może opisywać możliwości nowsze niż dostępne lokalnie CLI lub marketplace; wersje i daty muszą być zapisane przy dowodzie.
        - Brak runtime Claude Code uniemożliwia uczciwe potwierdzenie pełnego E2E; trzeba oddzielić dowód semantyczny, instalacyjny, statyczny i runtime.
        - Tekstowe transformacje mogą zawierać ukryte różnice semantyczne, których nie ujawni samo porównanie struktury katalogów.
        - Termin „jedno rozwiązanie” może oznaczać jedno źródło, jeden artefakt dystrybucyjny albo jeden runtime; synteza musi rozdzielić te poziomy.
        - Semantyka gate/delegation/progress może dryfować mimo poprawnego layoutu; globalne substytucje tekstu są głównym źródłem ryzyka.
        - Cursor i Kiro contracts są ruchome, a Kiro CLI/IDE wymagają osobnych, precyzyjnie nazwanych targetów.
        - Compiler na maszynie użytkownika zwiększa koszt awarii, jeśli nie jest transakcyjny i odtwarzalny offline.
        - Claude Code E5/E6 nie może być deklarowane bez realnej binarki, auth, wersji i wykonanego scenariusza.
        - Native marketplaces mogą wymagać prebuilt artifacts; wspólny installer powinien z nimi współistnieć, nie koniecznie je zastępować.
