task:
  title: "Implement advisor and arbiter mode for Maister orchestrators"
  description: >
    Implement the approved advisor/arbiter workflow for Maister orchestrator gates.
    Gate policy is configurable per gate type, supports manual, advisor, and fully
    automatic modes, preserves a non-overridable safety denylist, retries advisor
    calls with configurable backoff, persists every decision for resume, requires
    explicit user approval before implementation changes, and writes final Markdown
    and HTML decision summaries.
  status: completed
  tags:
    - development
    - orchestrator
    - advisor
    - arbiter
    - automation
  priority: high

