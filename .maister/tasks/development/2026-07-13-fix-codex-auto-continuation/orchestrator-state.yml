      summary: The high-confidence research recommends a shared executable gate evaluator, evaluator-owned terminal records, workflow-owned durable inventory and dispatch receipts, and a thin Codex binding; capability must remain unsupported until real host-native E2E passes.
      key_findings:
        - Agreement should terminate with the advisor and no UI.
        - Disagreement should create exactly one logical arbiter with bounded retries.
        - Runner commit is distinct from workflow dispatch and active-turn continuation.
        - Same-phase and next-phase continuation require durable checkpoints and deduplicated dispatch IDs.
      recommended_approach: Implement the A3/B1/C1/D1 architecture in canonical sources and the Codex adapter, then build generated variants and flip capability only after real host-native evidence.
      decisions:
        - decision: Use a shared executable evaluator and thin host binding.
          rationale: This prevents prose drift while preserving portable host-native delegation.
        - decision: Keep capability unsupported until native E2E exits successfully.
          rationale: Shared tests do not prove active-turn continuation or absence of UI.
      risks:
        - The exact Codex active-turn hook and headless entrypoint require an implementation spike.
        - Schema migration and concurrent YAML writers require fail-closed validation, locking, and revision/CAS.
