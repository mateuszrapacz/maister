task:
  title: Fix Cursor agents runtime discovery
  description: >
    Napraw problem z agentami: smoke-test po instalacji pluginu Maister dla Cursor
    wykazał, że 29 agentów jest na dysku (~/.cursor/plugins/local/maister/agents)
    i w plugin.json (agents: ./agents/), ale w runtime Task/subagent_type sesji
    Cursor widoczne są tylko built-iny (generalPurpose, cursor-guide, bugbot,
    security-review, best-of-n-runner). Skills (35) działają. Celem jest sprawienie,
    by agenci Maister (np. maister-code-reviewer, maister-explore) byli odkrywalni
    i wywoływalni przez Task w runtime Cursor — albo udokumentowanie/zaimplementowanie
    poprawnego mostu delegacji, jeśli natywny Task nie jest docelowym mechanizmem.
  status: completed
  workflow: development

