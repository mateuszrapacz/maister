task:
  title: Unify agent projections across supported hosts
  description: How should Maister transform, install, discover, and invoke all canonical agents consistently on Codex, Cursor, and Kiro CLI when maister-advisor follows the same rules as every other agent?
  status: completed
  tags: [development, architecture, agents, codex, cursor, kiro]
  priority: high

project_context:
  project_doc_paths:
    - .maister/docs/project/vision.md
    - .maister/docs/project/roadmap.md
    - .maister/docs/project/tech-stack.md
    - .maister/docs/project/architecture.md

task_context:
  risk_level: high
  clarifications_resolved: true
  scope_expanded: true
  architecture_decision: null
  tech_clarified: true
  task_characteristics:
    has_reproducible_defect: false
    modifies_existing_code: true
    creates_new_entities: true
    involves_data_operations: false
    ui_heavy: false
  research_reference:
    path: .maister/tasks/research/2026-07-17-unify-agent-projections
    research_question: How should Maister transform, install, discover, and invoke all canonical agents consistently on Codex, Cursor, and Kiro CLI when maister-advisor follows the same rules as every other agent?
    research_type: mixed
    confidence_level: high
  design_reference:
    source: null
    product_design_path: null
    mockup_count: 0
    has_brief: false
    index_path: null
  phase_summaries:
    research:
      summary: The research recommends one canonical 28-role Markdown inventory parsed into a versioned manifest, deterministic per-host projections in transaction staging, exact fail-closed runtime dispatch, narrow multi-root Kiro ownership, and no special Advisor or legacy Codex TOML path.
      key_findings:
        - Canonical Markdown remains the only behavior owner for all 28 roles.
        - Codex injects canonical prompts into generic subagents; Cursor and Kiro receive deterministic native projections.
        - Logical role resolution and runtime dispatch must be exact and fail closed with auditable execution records.
        - Kiro needs receipt-owned native leaf entries without taking ownership of unrelated user agents.
        - Clean installation removes legacy Advisor and Arbiter TOML topology without migration code.
      recommended_approach: Implement in dependency order from IR and manifest through projector, materializer and transaction integration, host projections, exact resolver and adapters, clean topology, evidence, tests, and documentation.
      decisions:
        - decision: Keep 28 canonical Markdown roles as the only behavior source.
          rationale: Eliminates manually maintained host copies and role drift.
        - decision: Project host representations deterministically inside transaction staging.
          rationale: Preserves immutable source provenance, validation, receipts, drift detection, and rollback.
        - decision: Treat advisor as an ordinary manifest row and runtime role.
          rationale: Removes special permissions, TOML lifecycle, and divergent behavior.
      risks:
        - Codex per-spawn model control and stable programmatic spawn schema are not confirmed.
        - Cursor collision precedence and Kiro exact identity observation require versioned native probes.
        - Multi-root Kiro transactions must preserve byte-exact rollback and unrelated user files.
      artifacts:
        - path: analysis/research-context/research-report.md
          label: Research report
          html: null
        - path: analysis/research-context/high-level-design.md
          label: High-level design
          html: null
        - path: analysis/research-context/decision-log.md
          label: Decision log
          html: null
    design:
      summary: null
      screen_count: 0
      component_count: 0
      index_path: null
      decisions: []
      risks: []
      artifacts: []
    codebase_analysis:
      key_files:
        - plugins/maister/lib/distribution/materializer.mjs
        - plugins/maister/lib/distribution/transaction-manager.mjs
        - plugins/maister/lib/distribution/recovery.mjs
        - plugins/maister/lib/distribution/receipt-schema.mjs
        - plugins/maister/lib/distribution/target-paths.mjs
        - plugins/maister/lib/distribution/host-probes/base.mjs
        - plugins/maister/agents/
        - plugins/maister/overlays/cursor/assets/agents/
        - plugins/maister/overlays/kiro-cli/assets/agents/
        - plugins/maister/skills/orchestrator-framework/bin/gate-evaluator.mjs
        - plugins/maister/skills/init/bin/reconcile-advisor-config.sh
      primary_language: JavaScript ESM
      summary: The repository has strong deterministic materialization and transactional-install foundations, but agent parity and delegation are declarative rather than operational. The work is complex and high risk because it adds staged role projection, multi-root Kiro ownership, exact host dispatch, stronger native evidence, and removal of legacy Advisor/Arbiter lifecycle paths.
      decisions:
        - decision: Keep plugins/maister/agents/*.md as the sole behavior owner and derive all host projections in transaction staging.
          rationale: Prevents manually maintained host copies and keeps generated bytes inside the validated transaction boundary.
        - decision: Dispatch through an exact fail-closed resolver and host adapter with no fallback.
          rationale: Makes role identity and failures executable and auditable rather than prose-only.
        - decision: Extend Kiro installation through receipt-owned leaf entries under its native agent root.
          rationale: Enables native discovery without taking ownership of unrelated user agents.
      risks:
        - "resolved: the user explicitly authorized discarding the unstaged .codex/agents/advisor.toml edit and deleting both tracked legacy Codex TOML profiles during implementation."
        - Codex generic-subagent spawn and per-spawn model control are not proven by the repository.
        - Cursor precedence and Kiro exact-name identity require pinned native probes.
        - Multi-root rollback must preserve byte-exact state and unrelated Kiro agent leaves.
      artifacts:
        - path: analysis/codebase-analysis.md
          label: Codebase analysis
          html: null
    clarifications:
      - question: The approved clean-install scope removes both tracked legacy Codex TOML profiles. I assume the unstaged user edit in .codex/agents/advisor.toml may be discarded and both files deleted during implementation. Is that correct?
        status: resolved
        answer: Confirm assumptions
        resolution: The user authorized discarding the unstaged Advisor-profile edit and deleting both tracked legacy Codex TOML profiles during implementation.
        recommendation: Provide more context
        artifact: analysis/clarifications.md
    gap_analysis:
      integration_points:
        - Canonical role parsing from plugins/maister/agents/*.md
        - Staged projection inside materializer.mjs before staging enumeration and hashing
        - Overlay contracts and normalized canonical/support inventories
        - Versioned receipt, journal, recovery, drift, verify, update, uninstall, and status contracts
        - Narrow Kiro native leaf ownership under ~/.kiro/agents
        - Exact logical-role resolution and active-receipt validation
        - Codex, Cursor, and Kiro host adapter ports
        - Execution records and corrected E5/E6 evidence producers
        - Legacy Codex Advisor/Arbiter topology removal
        - Platform-independent tests, packaging, release gates, and documentation
      summary: Maister has strong deterministic materialization and transactional-install foundations, but lacks an operational role projection and exact-dispatch layer. The task modifies existing distribution behavior while adding a strict role IR and manifest, staged projectors, multi-root Kiro ownership, exact resolver and adapters, execution records, and genuine native evidence.
      decisions:
        - decision: Treat the work as both modification of existing code and creation of new capabilities.
          rationale: Existing distribution and evidence contracts change while the role IR, projector, resolver, adapters, and execution record do not exist.
        - decision: Classify the dominant change as modificative with moderate compatibility requirements.
          rationale: Current safety and ownership guarantees remain strict, while legacy Codex TOML compatibility is explicitly excluded.
        - decision: Preserve the accepted research architecture as binding scope.
          rationale: Canonical ownership, host projections, Kiro leaf ownership, exact dispatch, Advisor equality, and evidence semantics are already decided.
        - decision: Route directly to specification after Phase 2.
          rationale: The task has neither a reproducible defect requiring TDD Red nor UI-heavy work requiring mockups.
      risks:
        - Multi-root Kiro lifecycle changes can weaken byte-exact rollback or delete unrelated user agents if implemented incompletely.
        - Codex per-spawn controls, Cursor collision precedence, and Kiro exact identity observation remain host-version-dependent.
        - Partial evidence changes could continue overstating native support.
        - Resolver or adapter errors could execute the wrong role unless every ambiguity and digest mismatch fails closed.
        - Existing release and topology baselines span many affected integration points.
      artifacts:
        - path: analysis/gap-analysis.md
          label: Gap analysis
          html: null
    scope_clarifications:
      scope_expanded: false
      summary: No scope decisions needed. The accepted research and resolved Phase 1 clarification already bind all material scope choices.
      decisions: []
      risks:
        - Host capability unknowns remain fail-closed or unavailable evidence outcomes rather than scope choices.
      artifacts:
        - path: analysis/scope-clarifications.md
          label: Scope clarifications
          html: null
    ui_mockups:
      components_designed: []
      summary: null
      decisions: []
      risks: []
      artifacts: []
    specification:
      summary: The revised specification defines one deterministic and auditable 28-role delivery and exact-invocation contract across Codex, Cursor, and Kiro CLI. Codex uses managed codex exec workers with enforceable per-role execution policy; Advisor and Arbiter bind exact maister:advisor through the common resolver. It contains 35 requirements, 17 reuse seams, 8 justified new capabilities, and risk-driven test groups.
      decisions:
        - decision: Keep the 28 canonical Markdown agents as the sole behavior owner.
          rationale: Host-maintained behavior copies have already drifted or become incomplete.
        - decision: Use a strict, versioned role IR and projection manifest.
          rationale: Every projector, resolver, topology check, and probe needs the same identity and digest contract.
        - decision: Generate host projections inside materializer staging.
          rationale: Projected bytes must participate in validation, hashing, provenance, receipts, rollback, and release closure.
        - decision: Use target-specific execution under common semantics.
          rationale: Codex requires managed process workers, Cursor native Markdown agents, and Kiro native descriptor/prompt pairs.
        - decision: Resolve only exact maister:<role_id> identities and fail closed.
          rationale: Fallback or fuzzy selection could execute an unintended role and conceal unsupported behavior.
        - decision: Generalize the existing transaction lifecycle around narrow managed roots.
          rationale: Kiro requires native discovery without granting Maister ownership of unrelated user agents.
        - decision: Treat Advisor exactly like every ordinary canonical role.
          rationale: Special TOML, permissions, model, destination, adapter, and evidence paths are prohibited.
        - decision: Keep materialization, E5 discovery, and E6 invocation as separate evidence layers.
          rationale: Structural presence cannot prove native discovery or exact execution.
      risks:
        - Codex exec controls/model availability, Cursor collision precedence, and Kiro observed identity remain host-version-dependent.
        - Multi-root persistence and recovery must ship as one complete lifecycle.
        - Existing E5 records may overstate native discovery support.
        - Legacy Codex TOML and receipt-v1 compatibility are intentionally excluded and obsolete state must fail clearly.
        - Target E5/E6 may legitimately remain unavailable when prerequisites are absent.
      artifacts:
        - path: analysis/requirements.md
          label: Confirmed requirements
          html: null
        - path: analysis/technical-clarifications.md
          label: Technical clarifications
          html: null
        - path: implementation/spec.md
          label: Specification
