task:
  title: Issue tracker workflow for Maister
  description: >-
    Research the best way to add selectable issue-tracker support (local Markdown,
    GitHub, and extensible providers), quick task capture, and handoff from a saved
    issue into normal Maister research, planning, and development workflows. Treat
    the installed mattpocock/skills implementation as a reference.
  status: completed
  tags: [research, issue-tracker, workflow, integration]
  priority: null

research_context:
  research_type: mixed
  research_question: >-
    How should Maister add configurable issue-tracker providers, fast task capture,
    and issue-to-workflow handoff while reusing good ideas from mattpocock/skills?
  scope:
    included:
      - Existing Maister architecture, commands, task state, and platform adapters
      - Installed mattpocock/skills tracker conventions and ticket workflows
      - Local Markdown, GitHub Issues, and an extensible provider seam
      - User experience for capture, listing, selection, and workflow handoff
      - Compatibility with research, quick-plan, and development workflows
      - Testing, migration, security, and multi-platform concerns
    excluded:
      - Implementing the feature during this research workflow
      - Selecting a tracker for the current repository
      - Building a hosted issue-tracking service
    constraints:
      - Preserve orchestrator-state.yml as the source of truth for workflow phase state
      - Keep canonical edits under plugins/maister and generate platform variants
      - Avoid coupling core workflows to a single external tracker
  methodology:
    - Technical iterative deepening
    - Requirements extraction
    - Comparative literature review
    - Multi-source triangulation
  sources:
    - Maister canonical plugin, adapters, tests, and project documentation
    - Installed mattpocock/skills files and tracker templates
    - Current official GitHub, GitLab, Jira Cloud, Linear, and OWASP documentation
  confidence_level: medium
  gathering_strategy:
    categories:
      - maister-internals
      - mattpocock-skills
      - tracker-providers
      - product-quality-tradeoffs
    count: 4
    source: planner
  project_doc_paths:
    - .maister/docs/project/vision.md
    - .maister/docs/project/roadmap.md
    - .maister/docs/project/tech-stack.md
    - .maister/docs/project/architecture.md
  phase_summaries:
    phase-1:
      summary: Research recommends a canonical issue-tracker skill backed by a small executable provider helper, with Local Markdown and GitHub in v1 and immutable issue snapshots handed into existing workflows.
      steps_completed: [initialize, plan, gather, synthesize]
      decisions:
        - decision: Wybrać helper wykonywalny + deklaratywne capabilities, nie prose-as-provider-API.
          rationale: Zapewnia jeden walidowany kontrakt i ogranicza różnice między hostami.
        - decision: Utrwalać maister-issue://...; przyjmować krótsze aliasy wyłącznie, gdy rozstrzygają się jednoznacznie.
          rationale: Referencje pozostają stabilne i jednoznaczne między providerami oraz repozytoriami.
        - decision: Rozwiązać i zsnapshotować issue przed utworzeniem workflow state; późniejszy drift tylko sygnalizować.
          rationale: Workflow pozostaje odtwarzalny, a tracker zachowuje własność nad żywym backlogiem.
        - decision: W v1 wdrożyć Local Markdown i GitHub; zostawić GitLab/Jira/Linear za tym samym kontraktem, bez pustych stubów.
          rationale: Ogranicza zakres i respektuje standard minimalnej implementacji.
      risks:
        - Sprzeczny schemat orchestrator-state.yml blokuje wybór jednego kanonicznego miejsca dla source_issue.
        - quick-plan ma różną trwałość na hostach; rekomendowany wspólny artifact proweniencji wymaga decyzji produktowej.
        - Nie jest zatwierdzone, czy v1 ma udostępniać tracker mutations poza create; raport rekomenduje osobny późniejszy etap.
        - Local locks/atomic replace wymagają jasno zadeklarowanego wsparcia zwykłych lokalnych filesystemów; konflikty Git pozostają manualne.
      artifacts:
