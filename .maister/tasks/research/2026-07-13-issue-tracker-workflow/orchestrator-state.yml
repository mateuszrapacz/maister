    phase-3:
      summary: Six sequential decision areas compare 18 alternatives; the recommended direction uses an executable Node ESM helper, root source_issue provenance, durable cross-host quick-plan artifacts, capture-only v1 mutations, transactional Local Markdown, and Local-first delivery.
      decisions:
        - decision: "Granica providerów: wykonywalny helper Node ESM z exact JSON i deklaratywnym CapabilitySet."
          rationale: Zapewnia parytet hostów, fail-closed validation i testowalność.
        - decision: "Proweniencja: korzeniowy source_issue wskazuje niezmienny snapshot, ale nie przejmuje własności backlogu."
          rationale: Oddziela żywy tracker od odtwarzalnego wejścia workflowu.
        - decision: "Quick-plan: wspólny .maister/plans/*.md na wszystkich hostach, także z native plan UI."
          rationale: Daje jeden trwały handoff artifact.
        - decision: "v1 mutations: wyłącznie capture/create."
          rationale: Ogranicza ryzyko i utrzymuje handoff read-only.
        - decision: "Dostarczanie: Local Markdown jako tracer, potem GitHub za tym samym conformance contract."
          rationale: Najpierw stabilizuje kontrakt i transakcyjność lokalną.
      risks:
        - Sprzeczne warianty schema state muszą zostać ujednolicone przed dodaniem source_issue.
        - Założenia o rename, fsync i lockach nie obejmują network filesystems.
        - GitHub write path może zakończyć się ambiguous_commit po timeout po dispatch.
        - Trwały artifact quick-plan wymaga testów parytetu hostów.
      artifacts:
        - path: outputs/solution-exploration.md
          label: Solution Exploration
          html: outputs/solution-exploration.html
    phase-4:
      summary: "All six convergence areas are resolved into an incremental architecture: executable helper, root provenance pointer, durable plans, capture-only mutations, transactional Local Markdown, then GitHub as the second tracer."
      decisions:
        - decision: Choose a small Node ESM helper with exact JSON and a declarative CapabilitySet.
          rationale: It provides the strongest host parity, fail-closed validation, and testability without a general provider framework.
        - decision: Anchor canonical source_issue provenance at the root of orchestrator-state.yml after state schema unification.
          rationale: It preserves one resume/audit source of truth without duplicating snapshot content or tracker ownership.
        - decision: Persist quick-plan as a canonical .maister/plans/*.md artifact on every host, with native UI as a projection.
          rationale: It provides a portable, Git-reviewable handoff to development.
        - decision: Limit v1 tracker mutations to explicit capture/create; keep handoff and resume read-only.
          rationale: It bounds side effects and defers lifecycle operations until concrete callers and conformance tests exist.
        - decision: Use per-UUID Local Markdown records with per-record locks, CAS, and atomic replace on ordinary local filesystems.
          rationale: It prevents lost updates while preserving readable files and byte-exact transactional rejection.
        - decision: Deliver Local Markdown as the first tracer and GitHub second over the same conformance contract.
          rationale: It creates small verifiable increments and isolates local contract issues before hosted failure modes.
      risks:
        - Codex fully_automatic pozostaje unsupported z powodu braku host-native adaptera/E2E oraz rozjazdu state schema; pełna diagnoza jest zapisana jako osobny artefakt.
      artifacts:
        - path: analysis/codex-fully-automatic-diagnosis.md
          label: Codex Fully Automatic Diagnosis
          html: null
      decision_areas:
        - area: Granica wykonawcza providerów
          alternatives_count: 3
          chosen_approach: 1C — mały helper Node ESM i deklaratywny CapabilitySet
        - area: Kanoniczna kotwica source_issue
          alternatives_count: 3
          chosen_approach: 2A — korzeniowy source_issue w orchestrator-state.yml
        - area: Proweniencja quick-plan między hostami
          alternatives_count: 3
          chosen_approach: 3B — wspólny .maister/plans/*.md plus native UI
        - area: Mutation surface w v1
          alternatives_count: 3
          chosen_approach: 4A — tylko jawne capture/create
        - area: Trwałość i współbieżność Local Markdown
          alternatives_count: 3
          chosen_approach: 5A — rekord per UUID, per-record lock, CAS i atomic replace
        - area: Kolejność providerów i rozszerzalność
          alternatives_count: 3
          chosen_approach: 6B — Local Markdown tracer, następnie GitHub
      deferred_ideas:
        - Comment/claim/close with receipts after concrete callers and reconciliation tests exist.
        - GitLab, Jira, and Linear providers after the Local+GitHub conformance suite stabilizes.
        - A public provider SDK only after at least three stable providers and real external authors exist.
        - Semantic local merge and hosted offline mutation queues remain out of scope.
    phase-5:
      summary: A layered provider boundary with immutable handoff snapshots separates live tracker ownership from reproducible workflow input. Six ADRs define the executable boundary, provenance, portable plans, bounded mutations, local transactions, and sequential provider delivery.
      decisions:
        - decision: Use one executable provider boundary instead of prose-only adapters or a command-template DSL.
          rationale: This centralizes validation, redaction, and cross-host semantics (ADR-001).
        - decision: Keep tracker data and workflow execution state under separate ownership, with root source_issue provenance after state-schema unification.
          rationale: This preserves tracker and workflow authority boundaries (ADR-002).
        - decision: Persist quick plans as portable Markdown artifacts on every host and treat native plan UI as a projection.
          rationale: This produces one durable cross-host handoff (ADR-003).
        - decision: Limit v1 mutations to explicit capture/create; handoff, resume, and drift checks remain read-only.
          rationale: This bounds side effects and operational risk (ADR-004).
        - decision: Give Local Markdown per-UUID records, per-record locks, compare-and-swap, and atomic replace only on ordinary local filesystems.
          rationale: This prevents lost updates within the supported filesystem boundary (ADR-005).
        - decision: Deliver Local Markdown first and GitHub second under the same conformance contract.
          rationale: This stabilizes the provider seam incrementally (ADR-006).
      risks:
        - The competing workflow-state schemas must be unified and fixture-tested before adding the root source_issue field; dual-read behavior is not part of this design.
        - Local filesystem guarantees do not extend to network or distributed filesystems; unsupported environments must fail preflight with an actionable diagnostic.
        - A GitHub create timeout after dispatch may remain ambiguous_commit; v1 must not blindly retry or switch transport.
        - Cross-host fixtures must prove that canonical quick-plan content and native UI projections cannot silently diverge.
        - Fully automatic Codex continuation remains unsupported until a host-native adapter, unified state schema, and end-to-end verification exist.
      artifacts:
        - path: outputs/high-level-design.md
          label: High-Level Design
          html: outputs/high-level-design.html
        - path: outputs/decision-log.md
          label: Decision Log
          html: outputs/decision-log.html
      architecture_style: layered provider boundary with immutable handoff snapshots
      decisions_count: 6
    phase-6:
      summary: Research, alternatives, convergence, and high-level design are complete. The final package recommends a provider-neutral executable boundary, immutable issue handoff, portable plans, capture-only v1 mutations, and Local Markdown then GitHub delivery.
      decisions: []
      risks:
        - Workflow-state schema unification remains a prerequisite for root source_issue provenance.
        - Codex automatic continuation remains unsupported until host-native end-to-end validation passes.
