research_context:
  research_type: technical
  research_question: Jak naprawić Codex fully_automatic tak, aby zgodność rekomendacji głównego agenta i advisora automatycznie wybierała decyzję, rozbieżność uruchamiała arbitra dokładnie raz, a wynik automatycznie kontynuował do następnego problemu bez interakcji użytkownika?
  scope:
    included:
      - Kanoniczny kontrakt orchestrator-state.yml i gate_history
      - Gate decision engine oraz phase-continue.mjs
      - Adapter i host-native E2E dla Codex
      - Pętla automatycznego przechodzenia przez kolejne problemy lub decision areas
      - Idempotencja, raportowanie, retry i bezpieczeństwo denylist
    excluded:
      - Implementacja poprawki
      - Zmiana chronionych bramek wymagających zgody użytkownika
      - Rozszerzenie funkcjonalności trackerów poza automatyczną kontynuację workflow
    constraints:
      - Zachować fail-closed dla denylisty i niskiej pewności
      - Edytować wyłącznie źródła kanoniczne oraz adaptery, nie generated variants
      - Udowodnić zachowanie testami kontraktowymi i host-native E2E
  methodology:
    - Codebase flow tracing
    - State schema comparison
    - Multi-source triangulation across code, tests, generated adapters, and prior diagnosis
  sources:
    - .maister/tasks/research/2026-07-13-issue-tracker-workflow/analysis/codex-fully-automatic-diagnosis.md
    - plugins/maister/skills/orchestrator-framework/references/gate-decision-engine.md
    - plugins/maister/skills/orchestrator-framework/bin/phase-continue.mjs
    - platforms/codex-cli/
    - tests/
  confidence_level: high
  gathering_strategy:
    categories:
      - gate-state-contract
      - continuation-dispatch
      - codex-host-adapter
      - verification-safety
    count: 4
    source: planner
  project_doc_paths:
    - .maister/docs/project/vision.md
    - .maister/docs/project/roadmap.md
    - .maister/docs/project/tech-stack.md
    - .maister/docs/project/architecture.md
  phase_summaries:
    phase-1:
      steps_completed: [initialize, plan, gather, synthesize]
      summary: Wymagany jest wykonywalny łańcuch evaluator → durable runner commit → Codex adapter → workflow loop; zgodność kończy advisor, rozbieżność dokładnie jeden arbiter, a trwały cursor i dispatch_id przenoszą sterowanie do kolejnego problemu bez kończenia tury.
      decisions:
        - decision: Użyć current_phase i pełnego gate_history jako jednego canonical contractu.
          rationale: Obecny started_phase i wąska historia runnera są niezgodne z realnym workflow i wymaganym audytem.
        - decision: Rozdzielić commit runnera od dispatchu workflow.
          rationale: Runner kończy proces po stdout i nie zna domenowej kolejności problemów.
        - decision: Nie zmieniać Codex capability na supported przed zielonym host-native E2E.
          rationale: Shared runner i fake integration nie dowodzą utrzymania tury ani rzeczywistego następnego dispatchu.
      risks:
        - Stabilny headless binding Codex wymaga krótkiego spike'a implementacyjnego.
        - Exactly-once musi oznaczać logiczny efekt deduplikowany przez dispatch_id, nie brak fizycznego retry.
      artifacts:
        - path: planning/research-brief.md
          label: Research brief
          html: null
        - path: planning/research-plan.md
          label: Research plan
          html: null
        - path: planning/sources.md
          label: Sources
          html: null
        - path: analysis/findings/01-gate-state-contract.md
          label: Gate and state contract
          html: null
        - path: analysis/findings/02-continuation-dispatch.md
          label: Continuation dispatch
          html: null
        - path: analysis/findings/03-codex-host-adapter.md
          label: Codex host adapter
          html: null
        - path: analysis/findings/04-verification-safety.md
          label: Verification and safety
          html: null
        - path: analysis/synthesis.md
          label: Research synthesis
          html: null
        - path: outputs/research-report.md
          label: Research report
          html: outputs/research-report.html
    phase-3:
      summary: Przeanalizowano 16 wariantów w czterech obszarach; rekomendowany zestaw A3+B1+C1+D1 rozdziela executable evaluator, pełny audit, workflow-owned durable dispatch i cienki binding Codex.
      decisions:
        - decision: A3 — wspólny executable evaluator z portami hosta.
          rationale: Zapewnia wykonywalną i przenośną state machine bez łączenia hosta z domenowym routingiem.
        - decision: B1 — evaluator zapisuje pełny rekord, runner go weryfikuje i kontynuuje.
          rationale: Zachowuje pełny provenance i umożliwia resume raportu/transition bez ponawiania modelu.
        - decision: C1 — workflow-owned inventory plus durable outbox/receipt.
          rationale: Pozwala sekwencyjnie przeliczać zależne work itemy oraz deduplikować logiczny efekt przez dispatch_id.
        - decision: D1 — cienki host-native binding Codex.
          rationale: Adapter utrzymuje turę i zwraca continue bez stawania się drugim źródłem prawdy.
      risks:
        - Headless i active-turn hook Codex wymaga krótkiego spike'a.
        - Dwa procesy zapisujące YAML wymagają wspólnego repository, revision/CAS lub lockowania.
      artifacts:
        - path: outputs/solution-exploration.md
          label: Solution exploration
          html: outputs/solution-exploration.html
    phase-4:
      summary: Trwa sekwencyjna konwergencja czterech zależnych decyzji architektonicznych.
      decision_areas:
        - area: Evaluator ownership and packaging
          alternatives_count: 4
          chosen_approach: A3 — wspólny executable evaluator z portami hosta
        - area: Canonical state and terminal record ownership
          alternatives_count: 4
          chosen_approach: B1 — evaluator zapisuje pełny rekord, runner konsumuje i weryfikuje
        - area: Same-phase cursor and dispatch protocol
          alternatives_count: 4
          chosen_approach: C1 — workflow-owned inventory plus durable outbox/receipt
        - area: Codex binding and native E2E seam
          alternatives_count: 4
          chosen_approach: D1 — cienki host-native binding wokół wspólnych CLI
      deferred_ideas: []
      decisions:
        - decision: A3 — wspólny executable evaluator z portami hosta.
          rationale: Jeden wykonywalny i przenośny gate engine bez domenowego routingu.
        - decision: B1 — evaluator zapisuje pełny rekord, runner konsumuje i weryfikuje.
          rationale: Pełny provenance jest trwały przed raportami i continuation.
        - decision: C1 — workflow-owned inventory plus durable outbox/receipt.
          rationale: Stabilne ID i dispatch_id zapewniają sekwencyjność oraz logiczne exactly-once.
        - decision: D1 — cienki host-native binding wokół wspólnych CLI.
          rationale: Codex utrzymuje aktywną turę bez duplikowania state machine lub routingu.
      risks: []
      artifacts: []
    phase-5:
      summary: Zaprojektowano executable state machine w architekturze ports-and-adapters z ośmioma komponentami runtime, wspólnym state repository, durable dispatch oraz cienkim bindingiem Codex.
      architecture_style: Executable state machine plus ports-and-adapters in a single-source multi-target plugin pipeline
      decisions_count: 8
      decisions:
        - decision: Shared executable gate evaluator.
          rationale: Agreement, arbitration, retry and resume become deterministic and portable.
        - decision: Evaluator-owned full gate record with runner verification.
          rationale: Full provenance is durable before reports and continuation.
        - decision: Workflow-owned inventory and durable outbox/receipt.
          rationale: Stable work_item_id and dispatch_id support logical exactly-once resume.
        - decision: Thin Codex binding returns continue to the active workflow loop.
          rationale: Host integration remains thin and does not duplicate state or routing logic.
      risks:
        - Codex active-turn/headless hook requires an implementation spike.
        - Schema v2 migration must fail closed for real existing workflow states.
        - Dispatch receivers must deduplicate by dispatch_id.
