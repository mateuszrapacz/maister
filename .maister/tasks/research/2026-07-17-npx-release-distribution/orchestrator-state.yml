          - "plan"
          - "gather"
          - "synthesize"
        decisions:
          - "Keep plugins/maister/bin/maister-install.mjs as the sole target mutation authority."
          - "Make the npx launcher an input adapter for release resolution, download, validation, extraction, and cleanup."
          - "Use mateuszrapacz release tags and target-specific archive names as the distribution contract."
          - "Prefer @mateuszrapacz/maister as the user-scoped npm package and maister as its binary."
          - "Bind target, version, asset, digest, source manifest, and E3 evidence before invoking the installer."
        risks:
          - "Safe archive extraction policy must be specified and tested."
          - "Existing checksum, SBOM, and provenance sidecars are not publisher authentication."
          - "npm package metadata and executable entrypoint do not exist yet."
          - "Ownership references away from Skillpanel require deliberate review; LICENSE needs a separate legal decision."
          - "Planner and gatherer subagents timed out; fallback research was used and recorded."
        artifacts:
