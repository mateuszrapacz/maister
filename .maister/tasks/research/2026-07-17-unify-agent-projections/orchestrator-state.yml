task:
  title: Unify agent projections across supported hosts
  description: Research a single-source, per-host agent projection and invocation model for Codex, Cursor, and Kiro CLI, treating maister-advisor exactly like every other agent and excluding read-only or sandbox-specific behavior.
  status: completed
  tags: [research, architecture, agents, codex, cursor, kiro]
  priority: high

research_context:
  research_type: mixed
  research_question: How should Maister transform, install, discover, and invoke all canonical agents consistently on Codex, Cursor, and Kiro CLI when maister-advisor follows the same rules as every other agent?
  scope:
    included:
      - Canonical agent inventory and ownership
      - Codex, Cursor, and Kiro CLI overlays and installation roots
      - Host-native discovery and runtime invocation contracts
      - Deterministic transformation, validation, tests, clean-install topology, and documentation
      - A development-ready recommendation and design handoff
    excluded:
      - Implementation changes in production code
      - Special read-only or sandbox treatment for maister-advisor
      - Unsupported hosts and legacy generated distributions
      - General redesign of non-agent skills and workflows
    constraints:
      - plugins/maister/agents remains the portable source of truth
      - Avoid committed generated trees and hand-maintained prompt duplication
      - Preserve transactional installation, rollback, and drift detection
      - Agent selection must be explicit and deterministic
  methodology:
    - Codebase architecture and execution-flow analysis
    - Cross-host inventory and reference validation
    - Official host-contract verification where required
    - Multi-source triangulation across source, overlays, tests, and documentation
  sources:
    - planning/sources.md
  confidence_level: high
  gathering_strategy:
    categories: [canonical-projection, codex-runtime, cursor-kiro-runtime, installer-tests-docs]
    count: 4
    source: planner
  project_doc_paths:
    - .maister/docs/project/vision.md
    - .maister/docs/project/roadmap.md
    - .maister/docs/project/tech-stack.md
    - .maister/docs/project/architecture.md
  phase_summaries:
    phase-1:
      summary: Research supports one canonical agent IR, a staged projector, an exact role resolver, and host-specific adapters; Codex injects prompts into generic subagents, Cursor uses projected Markdown, and Kiro uses projected JSON plus prompt files in its native agent root.
      steps_completed: [initialize, plan, gather, synthesize]
      decisions:
        - decision: Treat maister-advisor like every other canonical agent.
          rationale: The user explicitly removed the proposed Codex-only read-only and sandbox exception.
        - decision: Use one canonical agent parser, versioned manifest, and deterministic staged projector.
          rationale: Cursor and Kiro currently duplicate or omit behavior, while runtime-only generation would bypass receipt ownership and rollback.
        - decision: Dispatch every workflow role through an exact logical-role resolver and fail closed.
          rationale: Overlay capability labels and natural-language routing do not prove that the requested role executed.
      risks:
        - Current overlays contain duplicated or incomplete host projections that may require migration rather than an additive fix.
        - Native discovery and invocation remain unavailable where host runtime evidence could not be completed.
        - Kiro needs narrowly scoped ownership of generated leaves under its native agent root without taking ownership of the whole user directory.
        - Clean installation intentionally does not support upgrading environments with legacy Codex TOML files.
      artifacts:
        - path: planning/research-brief.md
          label: Research brief
          html: null
        - path: planning/research-plan.md
          label: Research plan
          html: null
        - path: planning/sources.md
          label: Source plan
          html: null
        - path: analysis/findings/01-canonical-projection.md
          label: Canonical projection findings
          html: null
        - path: analysis/findings/02-codex-runtime.md
          label: Codex runtime findings
          html: null
        - path: analysis/findings/03-cursor-kiro-runtime.md
          label: Cursor and Kiro runtime findings
          html: null
        - path: analysis/findings/04-installer-tests-docs.md
          label: Installer, tests, and documentation findings
          html: null
        - path: analysis/synthesis.md
          label: Research synthesis
          html: null
        - path: outputs/research-report.md
          label: Research report
          html: outputs/research-report.html
    phase-3:
      summary: Skipped because the user disabled brainstorming after research converged on one architecture.
      decisions:
        - decision: Skip solution alternative generation.
          rationale: No competing architecture remained after synthesis.
      risks: []
      artifacts: []
    phase-4:
      summary: Skipped because no alternatives were generated for convergence evaluation.
      decisions:
        - decision: Use the research report recommendation as the selected design direction.
          rationale: Brainstorming was intentionally skipped.
      risks: []
      artifacts: []
      decision_areas: []
      deferred_ideas: []
    phase-5:
      summary: The design uses a portable core with ports and adapters, deterministic staged projections, transactional filesystem delivery, and exact fail-closed role dispatch across Codex, Cursor, and Kiro.
      decisions:
        - decision: Do not implement a legacy Codex TOML migration path.
          rationale: The user specified clean installations and direct removal of old TOML agent files.
        - decision: Keep 28 canonical Markdown roles as the only behavior source.
          rationale: A versioned IR and manifest can project native representations without prompt duplication.
        - decision: Treat advisor exactly like every other canonical role.
          rationale: No role-specific installation, readonly, sandbox, TOML, or adapter branch is permitted.
        - decision: Generate native host representations deterministically inside transaction staging.
          rationale: Projection remains covered by validation, provenance, receipt ownership, rollback, and release closure.
        - decision: Resolve logical roles exactly and fail closed.
          rationale: Missing, duplicate, collision, unavailable, and digest mismatch conditions must never fall back.
        - decision: Separate materialization, native discovery, and exact invocation evidence.
          rationale: Structural parity alone does not prove that the intended role executed.
      risks:
        - Codex spawn schema and per-spawn model control remain version-dependent.
        - Cursor agent precedence requires a native collision probe.
        - Kiro exact identity observation requires a versioned native scenario.
        - Multi-root Kiro transactions require full rollback and race-condition coverage.
      artifacts:
        - path: outputs/high-level-design.md
          label: High-level design
          html: outputs/high-level-design.html
        - path: outputs/decision-log.md
          label: Decision log
          html: outputs/decision-log.html
      architecture_style: Portable core with ports and adapters, deterministic staged projection, and transactional filesystem delivery
      decisions_count: 6
    phase-6:
      summary: Final research summary and development handoff generated and explicitly approved by the user.
      decisions:
        - decision: Use the high-level design and decision log as the authoritative implementation input.
          rationale: They incorporate the user's clean-install correction and supersede the earlier migration recommendation.
      risks:
        - Native discovery and exact invocation remain unavailable until versioned host probes pass.
      artifacts:
        - path: outputs/decision-summary.md
          label: Decision summary
          html: outputs/decision-summary.html

