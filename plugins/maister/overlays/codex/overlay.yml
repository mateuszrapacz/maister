# yaml-language-server: $schema=../schema/overlay-v1.schema.json
schema_version: 1
overlay_id: maister/codex
overlay_version: 1.0.0
target:
  id: codex
  host_version_constraint: "0.145.0"
  discovery_roots:
    - .codex/plugins/local/maister
layout:
  - source: common/skills
    destination: skills
    kind: tree
    mode: "0755"
    ownership: whole_file
    child_prefix: "maister-"
  - source: assets/agent-metadata
    destination: skills
    kind: tree
    mode: "0755"
    ownership: whole_file
    child_prefix: "maister-"
    merge: true
  - source: assets/plugin.json
    destination: .codex-plugin/plugin.json
    kind: file
    mode: "0644"
    ownership: whole_file
  - source: assets/hooks
    destination: hooks
    kind: tree
    mode: "0755"
    ownership: whole_file
settings: []
semantic_bindings:
  user_gate:
    adapter: codex.chat_gate
    capability: semantic
    fail_closed: true
  delegate_agent:
    adapter: codex.exec
    capability: delegation
    fail_closed: true
  track_progress:
    adapter: codex.progress
    capability: persistence
    fail_closed: true
  resolve_task_root:
    adapter: codex.cwd
    capability: persistence
    fail_closed: true
  persist_state:
    adapter: codex.filesystem_state
    capability: persistence
    fail_closed: true
  continue_workflow:
    adapter: codex.resume
    capability: continuation
    fail_closed: true
inventory:
  required:
    - .codex-plugin/plugin.json
    - "skills/**/SKILL.md"
    - skills/maister-bye/SKILL.md
    - skills/maister-dev/SKILL.md
    - skills/maister-next/SKILL.md
    - skills/maister-resume/SKILL.md
    - skills/maister-status/SKILL.md
    - skills/maister-work/SKILL.md
    - "skills/**/agents/openai.yaml"
    - hooks/hooks.json
    - skills/maister-orchestrator-framework/bin/gate-evaluator.mjs
  optional:
    - "skills/**/agents/*.yaml"
  forbidden:
    - ".cursor-plugin/**"
    - "rules/**"
    - "steering/**"
    - "agents/*.md"
    - "agents/*.json"
    - ".claude-plugin/**"
    - "**/*claude*"
validation:
  forbidden_vocabulary:
    - claude
    - anthropic
    - .cursor-plugin
    - .claude-plugin
  executable_paths:
    - "hooks/*.sh"
  syntax_checks:
    - "json:.codex-plugin/plugin.json"
    - "json:hooks/hooks.json"
    - "yaml:skills/**/agents/openai.yaml"
capabilities:
  semantic_bindings:
    class: semantic
    required_evidence:
      - E1
      - E3
      - E5
      - E6
  safety_hooks:
    class: safety
    required_evidence:
      - E1
      - E2
      - E4
  state_persistence:
    class: persistence
    required_evidence:
      - E1
      - E2
      - E4
  rollback:
    class: rollback
    required_evidence:
      - E1
      - E2
      - E4
  native_discovery:
    class: packaging
    required_evidence:
      - E1
      - E2
      - E5
  native_runtime:
    class: semantic
    required_evidence:
      - E3
      - E6
native_assets:
  - source: assets/plugin.json
    destination: .codex-plugin/plugin.json
    mode: "0644"
    sha256: 55316e9c665651eb2b97071f2fe5c8b7229bf24f4b5c9261e3d007749ef282c1
  - source: assets/hooks/hooks.json
    destination: hooks/hooks.json
    mode: "0644"
    sha256: 32cc02295236fe9b7188c68fa68cead9ae69f5bedf9032acef435a313f318404
agent_projection:
  schema_version: 1
  contract: agent-projection-v1.json
  projector_version: 1.0.0
  adapter_id: codex.exec
  representation: codex-prompt-schema
  canonical_roles:
    - advisor
    - bottleneck-analyzer
    - code-quality-pragmatist
    - code-reviewer
    - codebase-analysis-reporter
    - docs-operator
    - e2e-test-verifier
    - gap-analyzer
    - html-companion-writer
    - implementation-completeness-checker
    - implementation-planner
    - information-gatherer
    - production-readiness-checker
    - project-analyzer
    - reality-assessor
    - research-planner
    - research-synthesizer
    - solution-brainstormer
    - solution-designer
    - spec-auditor
    - specification-creator
    - task-classifier
    - task-group-implementer
    - test-suite-runner
    - thermo-nuclear-code-quality-review-subagent
    - thermo-nuclear-review-subagent
    - ui-mockup-generator
    - user-docs-generator
  destinations:
    - kind: prompt
      path_template: skills/maister-orchestrator-framework/agents/maister-{role_id}.md
      mode: "0644"
    - kind: output-schema
      # pi-lens-ignore: line-length
      path_template: skills/maister-orchestrator-framework/agent-schemas/maister-{role_id}.schema.json
      mode: "0644"
  transform_ids:
    - canonical-body-v1
    - codex-output-schema-v1
  execution_profile_ids:
    - codex.read-only
    - codex.read-only-shell
    - codex.workspace-write
  support_inventory: []
