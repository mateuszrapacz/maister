# yaml-language-server: $schema=../schema/overlay-v1.schema.json
schema_version: 1
overlay_id: maister/pi
overlay_version: 1.0.0
target:
  id: pi
  adapter_id: pi.native
  projection: pi.native
  host_version_constraint: ">=0.80.10 <0.82.0"
  platform: posix
  discovery_roots:
    - .pi/agent/maister
  path_policy:
    agent_root_env: PI_CODING_AGENT_DIR
    default_agent_root: $HOME/.pi/agent
    settings_path: settings.json
    session_root_env: PI_CODING_AGENT_SESSION_DIR
    package_root_env: PI_PACKAGE_DIR
    package_path: maister
    containment: agent_root
layout:
  - source: generated/pi-package
    destination: maister
    kind: tree
    mode: "0755"
    ownership: plugin_private
settings:
  - path: settings.json
    format: json
    ownership: managed_array_entries
    managed_keys: []
    array_path: packages
    identity: pi_local_package_v1
    entries:
      - source: ./maister
    merge_policy: preserve_unmanaged_refuse_drift
semantic_bindings:
  user_gate:
    adapter: pi.extension
    capability: semantic
    fail_closed: true
  delegate_agent:
    adapter: pi.native
    capability: delegation
    fail_closed: true
  track_progress:
    adapter: execution-event-writer
    capability: persistence
    fail_closed: true
  resolve_task_root:
    adapter: maister.task-root
    capability: persistence
    fail_closed: true
  persist_state:
    adapter: maister.state-repository
    capability: persistence
    fail_closed: true
  continue_workflow:
    adapter: maister.phase-continuation
    capability: continuation
    fail_closed: true
inventory:
  required:
    - package.json
    - .maister-source.json
    - agent-projection-v1.json
    - pi-command-projection-v1.json
    - extensions/maister.ts
    - "skills/**/SKILL.md"
    - "prompts/*.md"
    - "agents/maister-*.md"
    - "common/**"
    - "lib/**"
    - "bin/**"
    - "orchestrator-framework/**"
  optional: []
  forbidden:
    - "commands/**"
    - ".git/**"
    - "node_modules/**"
    - "credentials/**"
    - "auth/**"
    - "trust/**"
    - "sessions/**"
    - ".pi/**"
    - "pi-subagents/**"
