# yaml-language-server: $schema=../schema/overlay-v1.schema.json
schema_version: 1
overlay_id: maister/cursor
overlay_version: 1.0.0
target:
  id: cursor
  host_version_constraint: ">=1.0.0"
  discovery_roots:
    - .cursor/plugins/local/maister
layout:
  - source: assets/skills
    destination: skills
    kind: tree
    mode: "0755"
    ownership: whole_file
  - source: assets/support-agents/explore.md
    destination: agents/maister-explore.md
    kind: file
    mode: "0644"
    ownership: whole_file
  - source: assets/rules
    destination: rules
    kind: tree
    mode: "0755"
    ownership: whole_file
  - source: assets/plugin.json
    destination: .cursor-plugin/plugin.json
    kind: file
    mode: "0644"
    ownership: whole_file
  - source: assets/hooks
    destination: hooks
    kind: tree
    mode: "0755"
    ownership: whole_file
  - source: assets/runtime/cursor-bridge-v1.mjs
    destination: runtime/cursor-bridge-v1.mjs
    kind: file
    mode: "0644"
    ownership: whole_file
settings:
  - path: .cursor/settings.json
    format: json
    ownership: managed_keys
    managed_keys:
      - plugins.maister
    merge_policy: preserve_unmanaged_refuse_drift
semantic_bindings:
  user_gate:
    adapter: cursor.chat_gate
    capability: semantic
    fail_closed: true
  delegate_agent:
    adapter: cursor.native
    capability: delegation
    fail_closed: true
  track_progress:
    adapter: cursor.checkpoint
    capability: persistence
    fail_closed: true
  resolve_task_root:
    adapter: cursor.workspace_root
    capability: persistence
    fail_closed: true
  persist_state:
    adapter: cursor.filesystem_state
    capability: persistence
    fail_closed: true
  continue_workflow:
    adapter: cursor.continue
    capability: continuation
    fail_closed: true
inventory:
  required:
    - .cursor-plugin/plugin.json
    - "skills/maister-*/SKILL.md"
    - skills/maister-bye/SKILL.md
    - skills/maister-dev/SKILL.md
    - skills/maister-next/SKILL.md
    - skills/maister-resume/SKILL.md
    - skills/maister-status/SKILL.md
    - skills/maister-work/SKILL.md
    - "agents/maister-*.md"
    - "rules/*.mdc"
    - hooks/hooks.json
    - runtime/cursor-bridge-v1.mjs
  optional:
    - "hooks/maister-*.sh"
  forbidden:
    - ".codex-plugin/**"
    - "skills/**/agents/openai.yaml"
    - "steering/**"
    - "agents/*.json"
    - ".claude-plugin/**"
    - "**/*claude*"
validation:
  forbidden_vocabulary:
    - claude
    - anthropic
    - .codex-plugin
    - .claude-plugin
  executable_paths:
    - "hooks/maister-*.sh"
  syntax_checks:
    - "json:.cursor-plugin/plugin.json"
    - "json:hooks/hooks.json"
    - "markdown:rules/*.mdc"
capabilities:
  semantic_bindings:
    class: semantic
    required_evidence:
      - E1
      - E3
      - E5
      - E6
  safety_hooks:
    class: safety
    required_evidence:
      - E1
      - E2
      - E4
  state_persistence:
    class: persistence
    required_evidence:
      - E1
      - E2
      - E4
  rollback:
    class: rollback
    required_evidence:
      - E1
      - E2
      - E4
  native_discovery:
    class: packaging
    required_evidence:
      - E1
      - E2
      - E5
  native_runtime:
    class: semantic
    required_evidence:
      - E3
      - E6
native_assets:
  - source: assets/plugin.json
    destination: .cursor-plugin/plugin.json
    mode: "0644"
    sha256: 9306574f24e7c3c50495f94465a54254349ec845b41c6a2336e2673d77af118d
  - source: assets/hooks/hooks.json
    destination: hooks/hooks.json
    mode: "0644"
    sha256: 80cfa7542e9be5a90520016fded84e1965e1532d541ea0130496fe6d930a74e5
  - source: assets/support-agents/explore.md
    destination: agents/maister-explore.md
    mode: "0644"
    sha256: 118bf52398598678e1b9a126be3e78516eab886bc0411e9d837aa3304ad54575
agent_projection:
  schema_version: 1
  contract: agent-projection-v1.json
  projector_version: 1.0.0
  adapter_id: cursor.native
  representation: cursor-markdown
  canonical_roles:
    - advisor
    - bottleneck-analyzer
    - code-quality-pragmatist
    - code-reviewer
    - codebase-analysis-reporter
    - docs-operator
    - e2e-test-verifier
    - gap-analyzer
    - html-companion-writer
    - implementation-completeness-checker
    - implementation-planner
    - information-gatherer
    - production-readiness-checker
    - project-analyzer
    - reality-assessor
    - research-planner
    - research-synthesizer
    - solution-brainstormer
    - solution-designer
    - spec-auditor
    - specification-creator
    - task-classifier
    - task-group-implementer
    - test-suite-runner
    - thermo-nuclear-code-quality-review-subagent
    - thermo-nuclear-review-subagent
    - ui-mockup-generator
    - user-docs-generator
  destinations:
    - kind: agent
      path_template: agents/maister-{role_id}.md
      mode: "0644"
  transform_ids:
    - canonical-body-v1
    - cursor-frontmatter-v1
  execution_profile_ids:
    - cursor.read-only
    - cursor.read-only-shell
    - cursor.workspace-write
  support_inventory:
    - support_id: explore
      native_role_external_id: explore
      assets:
        - kind: agent
          source: assets/support-agents/explore.md
          destination: agents/maister-explore.md
          mode: "0644"
