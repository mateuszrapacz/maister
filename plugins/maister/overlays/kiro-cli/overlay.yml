schema_version: 1
overlay_id: maister/kiro-cli
overlay_version: 1.0.0
target:
  id: kiro-cli
  host_version_constraint: ">=1.0.0"
  discovery_roots:
    - .kiro-maister
layout:
  - source: common/skills
    destination: skills
    kind: tree
    mode: "0755"
    ownership: whole_file
  - source: assets/steering
    destination: steering
    kind: tree
    mode: "0755"
    ownership: whole_file
  - source: assets/hooks
    destination: hooks
    kind: tree
    mode: "0755"
    ownership: whole_file
  - source: assets/agent-tools.json
    destination: agent-tools.json
    kind: file
    mode: "0644"
    ownership: whole_file
  - source: assets/settings-mcp.json
    destination: settings/mcp.json
    kind: file
    mode: "0644"
    ownership: whole_file
settings:
  - path: settings/mcp.json
    format: json
    ownership: whole_file
    managed_keys: []
    merge_policy: preserve_unmanaged_refuse_drift
  - path: settings/settings.json
    format: json
    ownership: managed_keys
    managed_keys:
      - chat.defaultAgent
    merge_policy: preserve_unmanaged_refuse_drift
semantic_bindings:
  user_gate:
    adapter: kiro-cli.chat_gate
    capability: semantic
    fail_closed: true
  delegate_agent:
    adapter: kiro-cli.native
    capability: delegation
    fail_closed: true
  track_progress:
    adapter: kiro-cli.checkpoint
    capability: persistence
    fail_closed: true
  resolve_task_root:
    adapter: kiro-cli.project_root
    capability: persistence
    fail_closed: true
  persist_state:
    adapter: kiro-cli.filesystem_state
    capability: persistence
    fail_closed: true
  continue_workflow:
    adapter: kiro-cli.continue
    capability: continuation
    fail_closed: true
inventory:
  required:
    - "skills/**/SKILL.md"
    - "maister*.json"
    - "instructions/*.md"
    - "steering/*.md"
    - "hooks/*.sh"
    - agent-tools.json
  optional:
    - settings/mcp.json
  forbidden:
    - ".codex-plugin/**"
    - ".cursor-plugin/**"
    - "rules/**"
    - "agents/*.md"
    - ".claude-plugin/**"
    - "**/*claude*"
validation:
  forbidden_vocabulary:
    - claude
    - anthropic
    - .codex-plugin
    - .cursor-plugin
    - .claude-plugin
  executable_paths:
    - "hooks/*.sh"
  syntax_checks:
    - "json:agent-tools.json"
    - "json:maister*.json"
    - "markdown:instructions/*.md"
    - "markdown:steering/*.md"
capabilities:
  semantic_bindings:
    class: semantic
    required_evidence:
      - E1
      - E3
      - E5
      - E6
  safety_hooks:
    class: safety
    required_evidence:
      - E1
      - E2
      - E4
  state_persistence:
    class: persistence
    required_evidence:
      - E1
      - E2
      - E4
  rollback:
    class: rollback
    required_evidence:
      - E1
      - E2
      - E4
  native_discovery:
    class: packaging
    required_evidence:
      - E1
      - E2
      - E5
  native_runtime:
    class: semantic
    required_evidence:
      - E3
      - E6
native_assets:
  - source: assets/agent-tools.json
    destination: agent-tools.json
    mode: "0644"
    sha256: 2a4e9274f0dd97433e98c99e42dd5af465127e227d003530b8a8b585220c9516
  - source: assets/settings-mcp.json
    destination: settings/mcp.json
    mode: "0644"
    sha256: 77a711f0ed6c082ede0094fd212fe8a7d440bf72074150021a3b152f2683da04
agent_projection:
  schema_version: 1
  contract: agent-projection-v1.json
  projector_version: 1.0.0
  adapter_id: kiro-cli.native
  representation: kiro-descriptor-prompt
  canonical_roles:
    - advisor
    - bottleneck-analyzer
    - code-quality-pragmatist
    - code-reviewer
    - codebase-analysis-reporter
    - docs-operator
    - e2e-test-verifier
    - gap-analyzer
    - html-companion-writer
    - implementation-completeness-checker
    - implementation-planner
    - information-gatherer
    - production-readiness-checker
    - project-analyzer
    - reality-assessor
    - research-planner
    - research-synthesizer
    - solution-brainstormer
    - solution-designer
    - spec-auditor
    - specification-creator
    - task-classifier
    - task-group-implementer
    - test-suite-runner
    - thermo-nuclear-code-quality-review-subagent
    - thermo-nuclear-review-subagent
    - ui-mockup-generator
    - user-docs-generator
  destinations:
    - kind: descriptor
      path_template: maister-{role_id}.json
      mode: "0644"
    - kind: prompt
      path_template: instructions/maister-{role_id}.md
      mode: "0644"
  transform_ids:
    - canonical-body-v1
    - kiro-descriptor-v1
  execution_profile_ids:
    - kiro-cli.read-only
    - kiro-cli.read-only-shell
    - kiro-cli.workspace-write
  support_inventory:
    - support_id: explore
      native_role_external_id: maister-explore
      assets:
        - kind: descriptor
          source: assets/support-agents/maister-explore.json
          destination: maister-explore.json
          mode: "0644"
        - kind: prompt
          source: assets/support-agents/instructions/maister-explore.md
          destination: instructions/maister-explore.md
          mode: "0644"
    - support_id: maister
      native_role_external_id: maister
      assets:
        - kind: descriptor
          source: assets/support-agents/maister.json
          destination: maister.json
          mode: "0644"
        - kind: prompt
          source: assets/support-agents/instructions/maister.md
          destination: instructions/maister.md
          mode: "0644"
