schema_version: 1
policy:
  supported_targets:
    - codex
    - cursor
    - kiro-cli
  required_every_target:
    - E1
    - E2
    - E4
  required_shared:
    - E3
  native_levels:
    - E5
    - E6
  unavailable_is_passed: false
  semantic_classes_fail_closed: true
  packaging_classes_may_be_provisional: true
freshness:
  renew_on:
    - expires_at
    - host_version
    - host
    - source_version
    - overlay_id
    - overlay_version
    - source_commit
    - scenario_version
    - schema_version
    - projector_version
    - canonical_set_digest
    - manifest_digest
    - projected_tree_digest
  default_ttl_hours: 24
capabilities:
  semantic_bindings:
    class: semantic
    required_evidence: [E1, E3, E5, E6]
  safety_hooks:
    class: safety
    required_evidence: [E1, E2, E4]
  state_persistence:
    class: persistence
    required_evidence: [E1, E2, E4]
  rollback:
    class: rollback
    required_evidence: [E1, E2, E4]
  native_discovery:
    class: packaging
    required_evidence: [E1, E2, E5]
  native_runtime:
    class: semantic
    required_evidence: [E3, E6]
targets:
  codex:
    host_version_source: codex --version
    native_probe_module: plugins/maister/lib/distribution/host-probes/codex.mjs
    discovery_subject: codex.exec
    discovery_scenario: codex-exec-discovery-v1
    invocation_scenario: codex-exec-invocation-v1
    runtime_evidence: unavailable-until-authenticated-control-probe
  cursor:
    host_version_source: agent --version
    native_probe_module: plugins/maister/lib/distribution/host-probes/cursor.mjs
    discovery_subject: manifest-native-role-external-ids
    discovery_scenario: cursor-native-inventory-v1
    invocation_scenario: cursor-native-invocation-v1
    runtime_evidence: unavailable-until-safe-observable-configured-scenario
  kiro-cli:
    host_version_source: kiro-cli --version
    native_probe_module: plugins/maister/lib/distribution/host-probes/kiro-cli.mjs
    discovery_subject: manifest-native-role-external-ids
    discovery_scenario: kiro-cli-native-inventory-v1
    invocation_scenario: kiro-cli-native-invocation-v1
    runtime_evidence: unavailable-until-safe-observable-configured-scenario
