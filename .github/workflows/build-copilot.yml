name: Build Copilot CLI Variant
on:
  push:
    branches: [master, v2]
    paths: ['plugins/maister/**', 'platforms/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Copilot CLI variant
        run: make build

      - name: Validate build
        run: make validate

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/maister-copilot/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Rebuild Copilot CLI variant"
          if git push; then
            echo "Pushed rebuild commit."
          else
            echo "::warning::Could not push commit — GITHUB_TOKEN lacks write access on this repository."
            echo "Build and validation succeeded; auto-commit was created locally but not pushed."
            echo "Enable Actions write permissions in repo settings, or push the rebuild manually."
          fi
