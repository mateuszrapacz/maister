name: Validate Portable Distribution

permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "plugins/maister/**"
      - "tests/platform-independent/**"
      - "Makefile"
      - ".github/workflows/**"
  pull_request:
    branches: [master]
    paths:
      - "plugins/maister/**"
      - "tests/platform-independent/**"
      - "Makefile"
      - ".github/workflows/**"

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Validate all overlays
        run: |
          make test-overlay TARGET=codex
          make test-overlay TARGET=cursor
          make test-overlay TARGET=kiro-cli
      - name: Run portable runtime and distribution tests
        run: make test-core test-runtime test-evidence
      - name: Verify repository topology
        run: make test-topology
      - name: Run reviewed three-target parity release gate
        run: make test-parity-release
