name: Cursor CLI Evidence (provisional)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: cursor-cli-evidence
  cancel-in-progress: true

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ">=22 <26"
      - name: Validate Cursor overlay
        run: make test-overlay TARGET=cursor
      - name: Probe preinstalled Cursor Agent CLI
        run: |
          set -euo pipefail
          export PATH="$HOME/.cursor/bin:$HOME/.local/bin:$PATH"
          node --input-type=module <<'EOF' | tee cursor-evidence.json
          import { probeCursor } from './plugins/maister/lib/distribution/host-probes/cursor.mjs';
          const result = probeCursor();
          process.stdout.write(`${JSON.stringify(result, null, 2)}\n`);
          EOF
          if grep -q '"result": "unavailable"' cursor-evidence.json; then
            echo "::notice title=Cursor evidence unavailable::No preinstalled Cursor Agent CLI was found; this run is packaging/provisional evidence only."
          else
            echo "::notice title=Cursor evidence collected::Native evidence was collected from the preinstalled runtime; review the artifact before making a support claim."
          fi
      - name: Validate evidence contract
        run: make test-evidence
      - name: Upload Cursor evidence record
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cursor-cli-evidence-${{ github.run_id }}
          path: cursor-evidence.json
          if-no-files-found: warn
