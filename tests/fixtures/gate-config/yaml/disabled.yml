advisor:
  enabled: false
  gate_policies:
    phase-exit: manual
    optional-phase: manual
    clarify: manual
    convergence: manual
    verify-matrix: manual
  advisor_agent: maister:advisor
  arbiter_agent: maister:advisor
  arbiter_enabled_on_disagreement: true
  retry:
    advisor_attempts: 3
    arbiter_attempts: 3
    backoff: exponential
