    required_evidence: [E3, E6]
native_assets: []
agent_projection:
  schema_version: 1
  contract: agent-projection-v1.json
  projector_version: 1.0.0
  adapter_id: pi.native
  representation: pi-agent-frontmatter
  canonical_roles:
