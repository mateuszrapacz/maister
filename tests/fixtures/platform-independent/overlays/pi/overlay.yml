    - test-suite-runner
    - thermo-nuclear-code-quality-review-subagent
    - thermo-nuclear-review-subagent
    - ui-mockup-generator
    - user-docs-generator
  destinations:
    - kind: package-agent
      path_template: agents/maister-{role_id}.md
      mode: "0644"
  transform_ids:
    - canonical-body-v1
    - pi-agent-frontmatter-v1
  execution_profile_ids:
    - pi.native
  support_inventory: []
compatibility:
  pi: 0.80.10
  node: 25.9.0
  pi_subagents: 0.35.1
  delegation_protocol: 1
probes:
  executable:
    command: pi
    version_args: [--version]
    expected_version: 0.80.10
    resolve_realpath: true
  prerequisite:
    package: pi-subagents
    export: pi-subagents/delegation
    version_range: ">=0.35.0 <0.36.0"
    tested_version: 0.35.1
    protocol_version: 1
